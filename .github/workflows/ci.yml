name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Run pytest (unit tests only)
        run: uv run pytest tests/ -v --tb=short -m "not e2e and not integration"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build MCP server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: false
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

  docker-compose:
    name: Docker Compose Build & E2E
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for docker compose
        run: |
          : > .env

      - name: Build and start services
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Verify MCP server health
        run: |
          curl -sf http://localhost:8000/health | jq .
          echo "MCP server healthy"

      - name: Verify React GUI is serving
        run: |
          curl -sf http://localhost:8080/ -o /dev/null -w "%{http_code}"
          echo ""
          echo "React GUI is serving"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install test dependencies
        run: uv sync --frozen --extra dev

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v --tb=short -m e2e

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose down -v
